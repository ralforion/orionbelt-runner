  - name: revenue_by_nation
    dialect: postgres
    started_at: '2026-04-29T18:02:03.762000+00:00'
    duration_ms: 1284.1
    row_count: 20
    server_time_ms: 1234.8
    timezone: Europe/Berlin
    sql_valid: true
    warnings: []
    sql: |-
      SELECT
          "nation"."n_name" AS "Nation",
          SUM("lineitem"."l_extendedprice" * (1 - "lineitem"."l_discount")) AS "Revenue"
      FROM "lineitem"
      JOIN "orders"   ON "lineitem"."l_orderkey"  = "orders"."o_orderkey"
      JOIN "customer" ON "orders"."o_custkey"     = "customer"."c_custkey"
      JOIN "nation"   ON "customer"."c_nationkey" = "nation"."n_nationkey"
      GROUP BY "nation"."n_name"
      ORDER BY "Revenue" DESC
      LIMIT 20
    resolved:
      fact_tables:
        - lineitem
      dimensions:
        - Nation
      measures:
        - Revenue
    explain:
      planner: DefaultPlanner
      planner_reason: single fact with dimension projection
      base_object: lineitem
      base_object_reason: fact carrying the Revenue measure
      where_filter_count: 0
      having_filter_count: 0
      has_totals: false
      joins:
        - from: lineitem
          to: orders
          columns:
            - l_orderkey
            - o_orderkey
          reason: reach customer via orders
        - from: orders
          to: customer
          columns:
            - o_custkey
            - c_custkey
          reason: reach nation via customer
        - from: customer
          to: nation
          columns:
            - c_nationkey
            - n_nationkey
          reason: dimension Nation lives on nation table
      cfl_legs:
        - measure_source: lineitem
          common_root: nation
          reason: single-leg path lineitem->orders->customer->nation
          measures:
            - Revenue
          joins:
            - lineitem->orders
            - orders->customer
            - customer->nation
