# Example run spec — loads a TPC-H semantic model into a fresh OBSL session
# and emits a monthly-revenue markdown report.
#
# Usage:
#   uv run orionbelt-runner run examples/monthly-revenue.yaml
#
# The runner posts ./tpch.obml.yml to /v1/sessions/{id}/models, runs the
# queries, then tears the session down. The OBSL server must have a working
# DB connection for the configured dialect (TPC-H tables: nation, region,
# customer, orders, lineitem, …).

name: Monthly Revenue
description: >
  Top-line numbers for the monthly business review. Loads its own TPC-H
  model into the OBSL session — works against any OBSL deployment with
  QUERY_EXECUTE=true and a connection serving the TPC-H tables.

obsl:
  base_url: http://localhost:8080
  locale: de              # render numbers/dates German-style (1.234,56)
  # timezone: Europe/Berlin   # uncomment to override the model default
  model:
    yaml_path: tpch.obml.yml   # resolved relative to this spec file

queries:
  - name: total_revenue
    description: Headline revenue number
    dialect: postgres
    query:
      select:
        dimensions: []
        measures: [Revenue]

  - name: revenue_by_nation
    description: Top 20 nations by revenue
    dialect: postgres
    query:
      select:
        dimensions: [Nation]
        measures: [Revenue]
      orderBy:
        - field: Revenue
          direction: desc
      limit: 20

  - name: top_orders_raw
    description: Largest order rows (raw mode)
    dialect: postgres
    query:
      select:
        fields:
          - Customers.Customer Name
          - Nations.Nation Name
          - Orders.Order Key
          - Orders.Order Total
      orderBy:
        - field: Orders.Order Total
          direction: desc
      limit: 50

report:
  format: markdown
  output: reports/monthly-revenue-{date}.md
  title: "Monthly Revenue — {date}"
  intro: |
    Auto-generated by OrionBelt Runner v{runner_version}.
    Run at {datetime}.
  sections:
    - heading: Total revenue
      query: total_revenue
      render: value

    - heading: Revenue by nation
      description: Top 20 nations by revenue.
      query: revenue_by_nation
      render: table

    - heading: Top orders
      description: Largest 50 individual orders.
      query: top_orders_raw
      render: table
