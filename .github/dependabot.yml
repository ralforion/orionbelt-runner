version: 2

# Dependabot version updates. Security updates are enabled separately in the
# repository settings and are not limited by open-pull-requests-limit here.
updates:
  # Python dependencies, resolved from pyproject.toml + uv.lock.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build(deps)
      prefix-development: build(deps-dev)
    # Grouped by explicit patterns rather than `dependency-type`: inside
    # `groups`, dependency-type is only supported for bundler, composer, mix,
    # maven, npm and pip — not uv. A dependency lands in the FIRST group it
    # matches, so dev tooling must be listed before the catch-all.
    groups:
      # Dev tooling churns often and never ships to users — one PR is enough.
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "respx"
          - "types-*"
        update-types: [minor, patch]
      # Everything else: runtime deps, plus weasyprint — it sits in `dev` but
      # also backs the `pdf` extra, so it ships to users and belongs here.
      # Majors are excluded from both groups, so they get their own PR.
      runtime:
        patterns: ["*"]
        update-types: [minor, patch]

  # Actions pinned in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci(deps)
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]

  # Base image in the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build(docker)
