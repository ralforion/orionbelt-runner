version: 2

# Dependabot version updates. Security updates are enabled separately in the
# repository settings and are not limited by open-pull-requests-limit here.
updates:
  # Python dependencies, resolved from pyproject.toml + uv.lock.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build(deps)
      prefix-development: build(deps-dev)
    groups:
      # Dev tooling churns often and never ships to users — one PR is enough.
      dev-tools:
        dependency-type: development
        update-types: [minor, patch]
      # Runtime patch/minor bumps travel together; majors get their own PR.
      runtime-minor:
        dependency-type: production
        update-types: [minor, patch]

  # Actions pinned in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci(deps)
    groups:
      actions:
        patterns: ["*"]
        update-types: [minor, patch]

  # Base image in the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: build(docker)
